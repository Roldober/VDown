
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDown</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { border: 1px solid #00ff00; padding: 20px; box-shadow: 0 0 15px #00ff00; text-align: center; background: #000; width: 90%; max-width: 450px; border-radius: 5px; }
        h2 { margin-top: 0; letter-spacing: 3px; font-weight: bold; }
        .input-group { display: flex; gap: 5px; margin-bottom: 20px; }
        input { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 12px; flex-grow: 1; outline: none; font-family: monospace; font-size: 14px; }
        .arrow-btn { background: #00ff00; color: #000; border: none; width: 50px; cursor: pointer; font-weight: bold; font-size: 20px; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .arrow-btn:hover { background: #00cc00; }
        .arrow-btn:disabled { background: #555; }
        #previewContainer { display: none; flex-direction: column; align-items: center; gap: 15px; border-top: 1px solid #333; padding-top: 20px; margin-top: 10px; }
        #thumb { width: 100%; border: 1px solid #00ff00; border-radius: 3px; }
        .download-btn { background: #00ff00; color: #000; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-decoration: none; display: block; box-sizing: border-box; }
        .download-btn:hover { background: #00cc00; box-shadow: 0 0 10px #00ff00; }
        .loader { display: none; font-size: 12px; margin-top: 10px; color: #ffff00; }
    </style>
</head>
<body>
    <div class="box">
        <h2>VDown</h2>
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Вставьте ссылку..." autocomplete="off">
            <button class="arrow-btn" id="searchBtn" onclick="fetchVideoData()">➔</button>
        </div>
        
        <div class="loader" id="loader">АНАЛИЗ ПОТОКА...</div>

        <div id="previewContainer">
            <img id="thumb" src="" alt="Превью">
            <a href="#" class="download-btn" id="finalDownloadBtn">СКАЧАТЬ</a>
        </div>
    </div>

    <script>
        async function fetchVideoData() {
            const urlInput = document.getElementById('videoUrl');
            const searchBtn = document.getElementById('searchBtn');
            const loader = document.getElementById('loader');
            const preview = document.getElementById('previewContainer');
            const thumb = document.getElementById('thumb');
            const downloadBtn = document.getElementById('finalDownloadBtn');
            const url = urlInput.value.trim();

            if (!url) return;

            searchBtn.disabled = true;
            loader.style.display = 'block';
            preview.style.display = 'none';

            try {
                // Используем альтернативный стабильный инстанс Cobalt
                const response = await fetch('https://cobalt-api.lunes.host/api/json', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        url: url,
                        videoQuality: '1080',
                        filenamePattern: 'basic'
                    })
                });

                const data = await response.json();

                if (data.url) {
                    // Установка превью (если API не дало, берем с YouTube напрямую)
                    thumb.src = data.picker ? data.picker[0].thumb : `https://img.youtube.com/vi/${extractVideoID(url)}/mqdefault.jpg`;
                    
                    downloadBtn.href = data.url;
                    preview.style.display = 'flex';
                } else {
                    alert('Ошибка: Сервер не смог обработать эту ссылку.');
                }
            } catch (err) {
                alert('Проблема со связью. Попробуйте еще раз.');
            } finally {
                searchBtn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : 'default';
        }
    </script>
</body>
</html>
